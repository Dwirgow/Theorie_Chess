<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theory Chess | Répertoire & Stratégie</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#d97706">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./icon.svg">

   <script src="Ouvertures.js"></script> 
   <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
   <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.21.4/babel.min.js"></script>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .chess-piece { filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.4)); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-neutral-950 text-neutral-100">
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef, Fragment } = React;

        const PIECES = {
          'P': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wp.png', 'N': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wn.png', 'B': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wb.png', 'R': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wr.png', 'Q': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wq.png', 'K': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/wk.png', 'p': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bp.png', 'n': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bn.png', 'b': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bb.png', 'r': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/br.png', 'q': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bq.png', 'k': 'https://images.chesscomfiles.com/chess-themes/pieces/neo/150/bk.png',
        };

        const translateSanToFr = (san) => {
            const map = {'N':'C', 'B':'F', 'R':'T', 'Q':'D', 'K':'R'};
            return san.replace(/[NBRQK]/g, match => map[match]);
        };

        const Chessboard = ({ fen, side }) => {
          const board = useMemo(() => {
            const rows = fen.split(' ')[0].split('/');
            let b = [];
            for (let row of rows) {
              let boardRow = [];
              for (let char of row) {
                if (isNaN(char)) boardRow.push(char);
                else for (let i = 0; i < parseInt(char); i++) boardRow.push('');
              }
              b.push(boardRow);
            }
            if (side === 'black') b = b.reverse().map(row => row.reverse());
            return b;
          }, [fen, side]);

          const ranks = side === 'white' ? [8, 7, 6, 5, 4, 3, 2, 1] : [1, 2, 3, 4, 5, 6, 7, 8];
          const files = side === 'white' ? ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'] : ['h', 'g', 'f', 'e', 'd', 'c', 'b', 'a'];

          return (
            <div className="flex flex-col shrink-0">
              <div className="flex">
                <div className="flex flex-col justify-around text-[10px] sm:text-xs font-bold text-neutral-500 pr-1.5 pb-0.5">
                    {ranks.map(r => <div key={`rank-${r}`} className="h-8 sm:h-10 flex items-center justify-center">{r}</div>)}
                </div>
                <div className="w-64 h-64 sm:w-80 sm:h-80 border-4 border-neutral-800 shadow-2xl grid grid-cols-8 grid-rows-8 bg-neutral-800 rounded overflow-hidden shrink-0">
                  {board.map((row, i) =>
                    row.map((piece, j) => {
                      const isLight = (i + j) % 2 === 0;
                      return (
                        <div key={`cell-${i}-${j}`} className={`w-full h-full flex items-center justify-center ${isLight ? 'bg-[#ebecd0]' : 'bg-[#739552]'}`}>
                          {piece && <img src={PIECES[piece]} className="w-[85%] h-[85%] chess-piece select-none pointer-events-none" draggable="false" />}
                        </div>
                      );
                    })
                  )}
                </div>
              </div>
              <div className="flex">
                  <div className="pr-1.5 invisible text-[10px] sm:text-xs font-bold">8</div>
                  <div className="flex w-64 h-4 sm:w-80 pt-1 text-[10px] sm:text-xs font-bold text-neutral-500">
                      {files.map(f => <div key={`file-${f}`} className="flex-1 text-center">{f}</div>)}
                  </div>
              </div>
            </div>
          );
        };

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                    lucide.createIcons({ root: iconRef.current });
                }
            }, [name, size, className]);
            return <span ref={iconRef} style={{ display: 'contents' }}></span>;
        };

        // --- COMPOSANT VARIATION ANALYSIS ---
        const VariationAnalysis = ({ variant, side, index }) => {
            const [activeLine, setActiveLine] = useState('main'); 
            const [currentIndex, setCurrentIndex] = useState(0);

            const mainSteps = useMemo(() => {
                if (typeof Chess === 'undefined') return [];
                const ch = new Chess();
                ch.load_pgn(variant.pgnEn);
                const moves = ch.history();
                const ch2 = new Chess();
                const steps = [{ fen: 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', sanFr: 'Début', sanEn: 'Start', isWhiteMove: false, moveNum: 0, index: 0 }];
                moves.forEach((move, i) => {
                    ch2.move(move);
                    steps.push({
                        fen: ch2.fen(),
                        sanFr: translateSanToFr(move),
                        sanEn: move,
                        moveNum: Math.floor(i / 2) + 1,
                        isWhiteMove: i % 2 === 0,
                        index: i + 1
                    });
                });
                return steps;
            }, [variant.pgnEn]);

            const subVariationsData = useMemo(() => {
                if (!variant.subVariations) return [];
                return variant.subVariations.map((sub, idx) => {
                    const ch = new Chess();
                    ch.load_pgn(sub.pgnEn);
                    const moves = ch.history();
                    const ch2 = new Chess();
                    const steps = [{ fen: 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1', sanFr: 'Début', sanEn: 'Start', isWhiteMove: false, moveNum: 0, index: 0 }];
                    moves.forEach((move, i) => {
                        ch2.move(move);
                        steps.push({
                            fen: ch2.fen(),
                            sanFr: translateSanToFr(move),
                            sanEn: move,
                            moveNum: Math.floor(i / 2) + 1,
                            isWhiteMove: i % 2 === 0,
                            index: i + 1
                        });
                    });
                    let devIndex = 1;
                    while (devIndex < steps.length && devIndex < mainSteps.length && steps[devIndex].sanEn === mainSteps[devIndex].sanEn) devIndex++;
                    return { ...sub, steps, devIndex, origIdx: idx };
                });
            }, [variant.subVariations, mainSteps]);

            useEffect(() => {
                setActiveLine('main');
                setCurrentIndex(mainSteps.length - 1);
            }, [mainSteps]);

            const currentSteps = activeLine === 'main' ? mainSteps : subVariationsData[activeLine].steps;
            const currentStep = currentSteps[currentIndex] || currentSteps[currentSteps.length - 1];
            const handleMoveClick = (line, idx) => { setActiveLine(line); setCurrentIndex(idx); };
            const goPrev = () => setCurrentIndex(i => Math.max(0, i - 1));
            const goNext = () => setCurrentIndex(i => Math.min(currentSteps.length - 1, i + 1));

            const renderInlinePgn = () => {
                const elements = [];
                for (let i = 1; i < mainSteps.length; i++) {
                    const step = mainSteps[i];
                    if (step.isWhiteMove) elements.push(<span key={`m-num-${i}`} className="text-neutral-500 font-bold ml-1 mr-1 select-none">{step.moveNum}.</span>);
                    else if (i > 1 && mainSteps[i-1].isWhiteMove === false) elements.push(<span key={`m-num-b-${i}`} className="text-neutral-500 font-bold ml-1 mr-1 select-none">{step.moveNum}...</span>);

                    const isMainActive = activeLine === 'main' && currentIndex === i;
                    elements.push(
                        <button key={`m-btn-${i}`} onClick={() => handleMoveClick('main', i)} className={`px-1 py-0.5 rounded transition-all font-semibold ${isMainActive ? 'bg-amber-600 text-white shadow' : 'text-blue-400 hover:bg-neutral-800'}`}>
                            {step.sanFr}
                        </button>
                    );

                    const branchingSubs = subVariationsData.filter(s => s.devIndex === i + 1);
                    branchingSubs.forEach(sub => {
                        elements.push(<span key={`sub-open-${i}-${sub.origIdx}`} className="text-neutral-600 ml-1 mr-1 font-bold">(</span>);
                        for (let j = sub.devIndex; j < sub.steps.length; j++) {
                            const subStep = sub.steps[j];
                            if (subStep.isWhiteMove || j === sub.devIndex) elements.push(<span key={`s-num-${sub.origIdx}-${j}`} className="text-neutral-500 text-sm ml-1 mr-1 select-none">{subStep.moveNum}{subStep.isWhiteMove ? '.' : '...'}</span>);
                            const isSubActive = activeLine === sub.origIdx && currentIndex === j;
                            elements.push(
                                <button key={`s-btn-${sub.origIdx}-${j}`} onClick={() => handleMoveClick(sub.origIdx, j)} className={`px-1 py-0.5 rounded transition-all text-sm italic ${isSubActive ? 'bg-red-600 text-white shadow not-italic font-bold' : 'text-neutral-400 hover:bg-neutral-800 hover:text-red-400'}`}>
                                    {subStep.sanFr}
                                </button>
                            );
                        }
                        elements.push(<span key={`sub-close-${i}-${sub.origIdx}`} className="text-neutral-600 ml-1 mr-1 font-bold">)</span>);
                    });
                }
                return elements;
            };

            const activeSubData = activeLine !== 'main' ? subVariationsData[activeLine] : null;

            return (
                <div className="bg-neutral-900 border border-neutral-800 rounded-3xl overflow-hidden shadow-xl mb-12">
                    <div className="p-6 lg:p-8">
                        <h4 className="text-lg md:text-xl font-bold text-white mb-4 flex items-center gap-2 border-b border-neutral-700/50 pb-2">
                            <span className="flex items-center justify-center w-6 h-6 rounded-full bg-amber-600 text-white text-xs shrink-0">{index + 1}</span>
                            {variant.name}
                        </h4>
                        
                        <div className="flex flex-col xl:flex-row gap-8 items-start">
                            <div className="flex-1 w-full flex flex-col gap-6">
                                <p className="text-neutral-300 text-lg leading-relaxed bg-neutral-800/30 p-5 rounded-xl border-l-2 border-amber-500/50">
                                    {variant.theory}
                                </p>

                                {!activeSubData && variant.pros && variant.cons && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-2">
                                        <div className="bg-emerald-950/20 border border-emerald-900/30 rounded-xl p-4">
                                            <h5 className="text-sm font-bold text-emerald-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="check-circle-2" size={16} /> Avantages</h5>
                                            <ul className="space-y-2 text-sm text-neutral-300">
                                                {variant.pros.map((pro, i) => <li key={`pro-${i}`} className="flex gap-2"><span className="text-emerald-500 mt-0.5">•</span> {pro}</li>)}
                                            </ul>
                                        </div>
                                        <div className="bg-red-950/20 border border-red-900/30 rounded-xl p-4">
                                            <h5 className="text-sm font-bold text-red-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="x-circle" size={16} /> Inconvénients</h5>
                                            <ul className="space-y-2 text-sm text-neutral-300">
                                                {variant.cons.map((con, i) => <li key={`con-${i}`} className="flex gap-2"><span className="text-red-500 mt-0.5">•</span> {con}</li>)}
                                            </ul>
                                        </div>
                                    </div>
                                )}

                                {activeSubData && (
                                    <div className="bg-red-950/20 border-l-4 border-red-600 p-6 rounded-xl animate-fade-in shadow-inner">
                                        <h5 className="text-red-400 font-bold uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="alert-triangle" size={18} /> {activeSubData.name} : Pourquoi c'est mauvais ?</h5>
                                        <p className="text-neutral-200 text-lg leading-relaxed">{activeSubData.explanation}</p>
                                    </div>
                                )}

                                <div className={`p-5 rounded-xl border transition-colors ${activeSubData ? 'bg-red-950/10 border-red-900/30' : 'bg-black/50 border-neutral-800/50'}`}>
                                    <div className="flex items-center justify-between mb-4 border-b border-neutral-800 pb-2">
                                        <span className="text-xs font-bold text-neutral-500 uppercase tracking-widest flex items-center gap-2"><Icon name="mouse-pointer-click" size={14} /> Cliquez sur un coup (parenthèses = erreurs)</span>
                                    </div>
                                    <div className="flex flex-wrap items-center leading-loose text-base sm:text-lg">
                                        {renderInlinePgn()}
                                    </div>
                                </div>

                                {!activeSubData && variant.strategy && (
                                    <div className="bg-amber-950/20 border border-amber-900/50 rounded-xl p-5 mt-2 animate-fade-in">
                                        <h5 className="text-sm font-bold text-amber-500 uppercase tracking-widest mb-3 flex items-center gap-2"><Icon name="compass" size={16} /> Plan de Jeu & Idées</h5>
                                        <p className="text-sm text-neutral-300 leading-relaxed mb-4">{variant.strategy}</p>
                                        <div className="flex items-center gap-3">
                                            <span className="text-xs text-neutral-500 uppercase font-bold tracking-wider">Coups Clés :</span>
                                            <div className="flex flex-wrap gap-2">
                                                {variant.keyMoves.map((km, i) => <span key={`km-${i}`} className="bg-neutral-800 text-neutral-300 px-2 py-1 rounded text-xs font-mono border border-neutral-700">{km}</span>)}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            <div className="flex flex-col items-center shrink-0 w-full xl:w-auto mt-2 xl:mt-0 sticky top-24">
                                <div className="flex items-center justify-between w-full mb-3 px-1">
                                    <span className="text-xs font-bold uppercase tracking-widest text-neutral-400">Coup <span className={activeSubData ? 'text-red-500 font-extrabold' : 'text-amber-500 font-bold'}>{currentIndex}</span> / {currentSteps.length - 1}</span>
                                </div>
                                {currentStep && <Chessboard fen={currentStep.fen} side={side} />}
                                <div className="flex gap-2 mt-4 w-full justify-center">
                                    <button onClick={() => setCurrentIndex(0)} disabled={currentIndex === 0} className="p-2 bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors flex items-center justify-center flex-1"><Icon name="chevrons-left" size={20} /></button>
                                    <button onClick={goPrev} disabled={currentIndex === 0} className="p-2 bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors flex items-center justify-center flex-1"><Icon name="chevron-left" size={20} /></button>
                                    <button onClick={goNext} disabled={currentIndex === currentSteps.length - 1} className="p-2 bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors flex items-center justify-center flex-1"><Icon name="chevron-right" size={20} /></button>
                                    <button onClick={() => setCurrentIndex(currentSteps.length - 1)} disabled={currentIndex === currentSteps.length - 1} className="p-2 bg-neutral-800 hover:bg-neutral-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg transition-colors flex items-center justify-center flex-1"><Icon name="chevrons-right" size={20} /></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- COMPOSANT EXERCISE TRAINER ---
        const ExerciseTrainer = ({ exercise }) => {
            const [currentStep, setCurrentStep] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [wrongGuesses, setWrongGuesses] = useState([]);
            const [isCompleted, setIsCompleted] = useState(false);

            const stepData = exercise.steps[currentStep];

            const handleAnswer = (optionIndex, isCorrect) => {
                if (selectedAnswer?.isCorrect) return;
                setSelectedAnswer({ index: optionIndex, isCorrect });
                if (!isCorrect && !wrongGuesses.includes(optionIndex)) setWrongGuesses([...wrongGuesses, optionIndex]);
            };

            const nextStep = () => {
                if (currentStep < exercise.steps.length - 1) {
                    setCurrentStep(currentStep + 1);
                    setSelectedAnswer(null);
                    setWrongGuesses([]);
                } else {
                    setIsCompleted(true);
                }
            };

            const reset = () => {
                setCurrentStep(0);
                setSelectedAnswer(null);
                setWrongGuesses([]);
                setIsCompleted(false);
            };

            return (
                <div className="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 lg:p-8 animate-fade-in shadow-xl mb-8">
                    <h4 className="text-xl font-bold text-white mb-6 border-b border-neutral-700/50 pb-3 flex justify-between items-center">
                        <span>{exercise.title}</span>
                        <span className="text-sm font-normal text-neutral-400">Étape {currentStep + 1} / {exercise.steps.length}</span>
                    </h4>

                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="flex-1">
                            {!isCompleted ? (
                                <div className="space-y-6">
                                    <div className="bg-amber-900/20 border border-amber-800/50 p-5 rounded-xl">
                                        <p className="text-lg text-amber-100 font-medium">{stepData.question}</p>
                                    </div>
                                    <div className="grid gap-3">
                                        {stepData.options.map((opt, idx) => {
                                            const isAlreadySolved = selectedAnswer?.isCorrect;
                                            const isKnownWrong = wrongGuesses.includes(idx);
                                            const isSelected = selectedAnswer?.index === idx;
                                            let btnClass = "text-left p-4 rounded-xl border transition-all ";
                                            
                                            if (isAlreadySolved) {
                                                if (isSelected && opt.isCorrect) btnClass += "bg-emerald-900/40 border-emerald-500 text-emerald-100";
                                                else btnClass += "bg-neutral-800/50 border-neutral-800 text-neutral-500 opacity-50 cursor-not-allowed";
                                            } else {
                                                if (isKnownWrong) btnClass += "bg-red-950/30 border-red-900/50 text-red-300/50 cursor-not-allowed";
                                                else btnClass += "bg-neutral-800 border-neutral-700 hover:bg-neutral-600 text-neutral-200 cursor-pointer";
                                            }

                                            return (
                                                <button key={idx} onClick={() => handleAnswer(idx, opt.isCorrect)} className={btnClass} disabled={isAlreadySolved || isKnownWrong}>
                                                    {opt.text}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    {selectedAnswer && (
                                        <div className={`p-4 rounded-xl animate-fade-in ${selectedAnswer.isCorrect ? 'bg-emerald-950/50 border-l-4 border-emerald-500' : 'bg-red-950/50 border-l-4 border-red-500'}`}>
                                            <p className="text-neutral-200 mb-4">{stepData.options[selectedAnswer.index].feedback}</p>
                                            {selectedAnswer.isCorrect ? (
                                                <button onClick={nextStep} className="bg-amber-600 hover:bg-amber-500 text-white px-6 py-2 rounded-lg font-bold transition-colors">
                                                    {currentStep < exercise.steps.length - 1 ? "Question suivante" : "Terminer l'exercice"}
                                                </button>
                                            ) : (
                                                <div className="flex items-center gap-2 text-red-400 text-sm font-bold mt-2"><Icon name="refresh-ccw" size={16} /> <span>Cette réponse est incorrecte. Choisissez une autre option.</span></div>
                                            )}
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div className="text-center py-12 animate-fade-in">
                                    <div className="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="check" size={32} className="text-white" /></div>
                                    <h3 className="text-2xl font-bold text-white mb-2">Exercice réussi !</h3>
                                    <button onClick={reset} className="mt-6 bg-neutral-800 hover:bg-neutral-700 text-white px-6 py-2 rounded-lg transition-colors">Recommencer l'exercice</button>
                                </div>
                            )}
                        </div>
                        <div className="w-full lg:w-96 shrink-0 flex justify-center">
                            <Chessboard fen={exercise.fen} side={exercise.side} />
                        </div>
                    </div>
                </div>
            );
        };

// --- NOUVEAU COMPOSANT : REPERTOIRE BUILDER (Optimisation colonnes & retours à la ligne) ---
        const RepertoireBuilder = () => {
            const data = window.REPERTOIRE_BUILDER;
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({ agressif: 0, positionnel: 0, systeme: 0, hypermoderne: 0 });
            const [result, setResult] = useState(null);
            const [tableSide, setTableSide] = useState('white');

            if (!data) return <div className="text-red-500 p-8">Erreur: Données du répertoire introuvables.</div>;

            const calculateAdvancedProfile = (finalScores) => {
                const sortedScores = Object.entries(finalScores).sort((a, b) => b[1] - a[1]);
                const top1 = sortedScores[0];
                const top2 = sortedScores[1];

                if (top1[1] >= 4 || (top1[1] === 3 && top2[1] === 1)) {
                    return `pure_${top1[0]}`;
                } else {
                    const mixedStyles = [top1[0], top2[0]].sort();
                    return `${mixedStyles[0]}_${mixedStyles[1]}`;
                }
            };

            const handleAnswer = (style) => {
                const newScores = { ...scores, [style]: (scores[style] || 0) + 1 };
                setScores(newScores);
                
                if (currentQ < data.quiz.length - 1) {
                    setCurrentQ(currentQ + 1);
                } else {
                    const finalProfile = calculateAdvancedProfile(newScores);
                    setResult(finalProfile);
                }
            };

            const resetQuiz = () => {
                setCurrentQ(0);
                setScores({ agressif: 0, positionnel: 0, systeme: 0, hypermoderne: 0 });
                setResult(null);
            };

            const displayedOpenings = tableSide === 'white' ? data.whiteOpenings : data.blackOpenings;

            return (
                <div className="space-y-12 animate-fade-in">
                    {/* SECTION 1 : LE QUIZ & RÉSULTATS */}
                    <div className="bg-neutral-900 border border-neutral-800 rounded-3xl p-6 lg:p-10 shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-1 bg-neutral-800">
                            {!result && <div className="h-full bg-amber-500 transition-all duration-300" style={{ width: `${(currentQ / data.quiz.length) * 100}%` }}></div>}
                        </div>

                        {!result ? (
                            <div className="max-w-3xl mx-auto">
                                <h3 className="text-2xl font-bold text-white mb-2 flex items-center gap-3"><Icon name="help-circle" className="text-amber-500" /> Profilage de joueur</h3>
                                <p className="text-neutral-400 mb-8">Répondez à ces 5 questions pour découvrir les ouvertures qui correspondent à votre nature profonde sur l'échiquier.</p>
                                
                                <div className="bg-neutral-800/50 p-6 rounded-2xl border border-neutral-700/50 mb-6">
                                    <p className="text-xl text-white font-medium mb-6">{data.quiz[currentQ].question}</p>
                                    <div className="space-y-3">
                                        {data.quiz[currentQ].options.map((opt, i) => (
                                            <button key={i} onClick={() => handleAnswer(opt.style)} className="w-full text-left p-4 rounded-xl border border-neutral-700 bg-neutral-800 hover:bg-amber-600 hover:border-amber-500 hover:text-white transition-all text-neutral-300">
                                                {opt.text}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div className="text-right text-sm text-neutral-500 font-bold">Question {currentQ + 1} / {data.quiz.length}</div>
                            </div>
                        ) : (
                            <div className="max-w-4xl mx-auto text-center animate-fade-in">
                                <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-amber-500/20 text-amber-500 mb-6">
                                    <Icon name="award" size={40} />
                                </div>
                                <h3 className="text-3xl font-extrabold text-white mb-2">Votre Profil : {data.profiles[result].name}</h3>
                                <p className="text-lg text-neutral-300 mb-10 max-w-2xl mx-auto leading-relaxed">{data.profiles[result].description}</p>
                                
                                <div className="bg-neutral-800/30 border border-neutral-700/50 p-6 rounded-2xl inline-block text-left w-full max-w-2xl">
                                    <h4 className="text-sm font-bold uppercase tracking-widest text-amber-500 mb-6 flex items-center gap-2"><Icon name="target" size={16}/> Votre Répertoire Recommandé :</h4>
                                    
                                    <ul className="space-y-4">
                                        {data.profiles[result].suggestions.map((sug, i) => {
                                            const isWhite = i === 0;
                                            const iconSrc = isWhite ? PIECES['K'] : PIECES['k'];
                                            const parts = sug.split(' : ');
                                            const label = parts[0];
                                            const name = parts[1] || '';

                                            return (
                                                <li key={i} className="flex items-center gap-4 text-white bg-neutral-900/80 p-4 rounded-xl border border-neutral-700/50 shadow-sm hover:border-amber-500/50 transition-colors">
                                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${isWhite ? 'bg-[#ebecd0] border border-white' : 'bg-[#2a2a2a] border border-neutral-600'}`}>
                                                        <img src={iconSrc} className="w-10 h-10 chess-piece drop-shadow-md" alt={isWhite ? "Roi Blanc" : "Roi Noir"} draggable="false" />
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="text-xs font-bold text-neutral-400 uppercase tracking-widest">{label}</span>
                                                        <span className="text-xl font-extrabold text-amber-400">{name}</span>
                                                    </div>
                                                </li>
                                            );
                                        })}
                                    </ul>
                                </div>
                                <div className="mt-10">
                                    <button onClick={resetQuiz} className="bg-neutral-800 hover:bg-neutral-700 text-white px-6 py-2.5 rounded-lg transition-colors font-bold shadow-lg">Refaire le profilage</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* SECTION 2 : LE TABLEAU DES OUVERTURES SANS LA COLONNE COUPS */}
                    <div>
                        <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b border-neutral-800 pb-4">
                            <h3 className="text-2xl font-bold text-white flex items-center gap-3">
                                <Icon name="table" className="text-amber-500" /> Base de Données des Ouvertures
                            </h3>
                            
                            <div className="flex bg-neutral-800 p-1 rounded-full border border-neutral-700">
                                <button onClick={() => setTableSide('white')} className={`px-6 py-2 rounded-full text-sm font-bold transition-all flex items-center gap-2 ${tableSide === 'white' ? 'bg-white text-black shadow-lg' : 'text-neutral-400 hover:text-white'}`}>
                                    <Icon name="sword" size={16} /> Armes Blanches
                                </button>
                                <button onClick={() => setTableSide('black')} className={`px-6 py-2 rounded-full text-sm font-bold transition-all flex items-center gap-2 ${tableSide === 'black' ? 'bg-neutral-700 text-white shadow-lg' : 'text-neutral-400 hover:text-white'}`}>
                                    <Icon name="shield" size={16} /> Défenses Noires
                                </button>
                            </div>
                        </div>

                        {/* Rendu figé grâce à table-fixed et répartition stricte des largeurs */}
                        <div className="overflow-hidden bg-neutral-900 border border-neutral-800 rounded-2xl shadow-xl">
                            <table className="w-full text-left border-collapse table-fixed">
                                <thead>
                                    <tr className="bg-neutral-950/50 border-b border-neutral-800">
                                        <th className="p-4 text-sm font-bold text-neutral-400 uppercase tracking-wider w-1/4 sm:w-1/3">Ouverture</th>
                                        <th className="p-4 text-sm font-bold text-neutral-400 uppercase tracking-wider w-1/4 sm:w-1/4">Style</th>
                                        <th className="p-4 text-sm font-bold text-neutral-400 uppercase tracking-wider w-2/4 sm:w-5/12">Description</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-neutral-800">
                                    {displayedOpenings && displayedOpenings.map((op, i) => {
                                        let badgeColor = "bg-neutral-800 text-neutral-300 border-neutral-700";
                                        if (op.style.includes("Agressif")) badgeColor = "bg-red-950/40 text-red-400 border-red-900/50";
                                        if (op.style.includes("Positionnel")) badgeColor = "bg-blue-950/40 text-blue-400 border-blue-900/50";
                                        if (op.style.includes("Hypermoderne")) badgeColor = "bg-purple-950/40 text-purple-400 border-purple-900/50";
                                        if (op.style === "Système" || op.style.includes("Système")) badgeColor = "bg-emerald-950/40 text-emerald-400 border-emerald-900/50";

                                        return (
                                            <tr key={i} className="hover:bg-neutral-800/30 transition-colors">
                                                {/* Remplacement de whitespace-nowrap par break-words pour le retour à la ligne automatique */}
                                                <td className="p-4 font-bold text-white text-sm sm:text-base break-words">{op.name}</td>
                                                <td className="p-4">
                                                    <span className={`px-2.5 py-1 rounded-full text-[10px] sm:text-xs font-bold border inline-block break-words ${badgeColor}`}>
                                                        {op.style}
                                                    </span>
                                                </td>
                                                <td className="p-4 text-xs sm:text-sm text-neutral-400 whitespace-normal break-words">{op.desc}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };
		
        // --- COMPOSANT APP PRINCIPAL ---
        const App = () => {
            const [side, setSide] = useState('white');
            const [selectedOpening, setSelectedOpening] = useState(null);
            const [sidebarOpen, setSidebarOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('theory'); // 'theory' ou 'practice'
            const [currentView, setCurrentView] = useState('opening'); // 'opening' ou 'builder'

            useEffect(() => {
                if (window.OPENINGS_DATA && window.OPENINGS_DATA[side] && window.OPENINGS_DATA[side].length > 0) {
                    setSelectedOpening(window.OPENINGS_DATA[side][0]);
                    setActiveTab('theory');
                }
            }, [side]);

            if (!selectedOpening && currentView === 'opening') return <div className="text-white p-8">Chargement des données...</div>;

            return (
                <div className="min-h-screen bg-neutral-950 text-neutral-100 selection:bg-amber-500/30 pb-20">
                    <header className="border-b border-neutral-800 bg-neutral-900/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <button onClick={() => setSidebarOpen(true)} className="lg:hidden p-2 hover:bg-neutral-800 rounded-lg">
                                    <Icon name="menu" />
                                </button>
                                <div className="bg-amber-600 p-2 rounded-lg">
                                    <Icon name="book-open" className="text-white" />
                                </div>
                                <h1 className="text-xl font-bold hidden sm:block bg-gradient-to-r from-white to-neutral-400 bg-clip-text text-transparent">
                                    Theory Chess
                                </h1>
                            </div>
                            
                            <div className={`flex bg-neutral-800 p-1 rounded-full border border-neutral-700 transition-opacity ${currentView === 'builder' ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                                <button onClick={() => setSide('white')} className={`px-4 sm:px-6 py-1.5 rounded-full text-sm font-medium transition-all ${side === 'white' ? 'bg-white text-black' : 'text-neutral-400'}`}>Blancs</button>
                                <button onClick={() => setSide('black')} className={`px-4 sm:px-6 py-1.5 rounded-full text-sm font-medium transition-all ${side === 'black' ? 'bg-neutral-700 text-white' : 'text-neutral-400'}`}>Noirs</button>
                            </div>
                        </div>
                    </header>

                    <div className="max-w-7xl mx-auto flex">
                        <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-neutral-900 border-r border-neutral-800 transform transition-transform duration-300 lg:relative lg:translate-x-0 ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                            <div className="p-4 flex flex-col h-full">
                                <div className="flex justify-between mb-6 lg:hidden">
                                    <span className="font-bold">Menu</span>
                                    <button onClick={() => setSidebarOpen(false)}><Icon name="x" size={20}/></button>
                                </div>
                                
                                <div className="mb-6">
                                    <button 
                                        onClick={() => {
                                            setCurrentView('builder');
                                            if(window.innerWidth < 1024) setSidebarOpen(false);
                                        }}
                                        className={`w-full flex items-center gap-3 p-4 rounded-xl border transition-all font-bold ${currentView === 'builder' ? 'bg-amber-500 text-black border-amber-400 shadow-lg shadow-amber-900/20' : 'bg-neutral-800/50 text-amber-500 border-amber-500/30 hover:bg-neutral-800 hover:border-amber-500'}`}
                                    >
                                        <Icon name="hammer" size={20} />
                                        Construire son répertoire
                                    </button>
                                </div>

                                <div className="text-xs font-bold text-neutral-500 uppercase tracking-widest mb-3 px-2 border-b border-neutral-800 pb-2">
                                    Théorie : Les {side === 'white' ? 'Blancs' : 'Noirs'}
                                </div>

                                <div className="space-y-1 overflow-y-auto pb-20">
                                    {window.OPENINGS_DATA && window.OPENINGS_DATA[side] && window.OPENINGS_DATA[side].map((opening) => (
                                        <div key={`nav-${opening.id}`} className="mb-1">
                                            <button 
                                                onClick={() => {
                                                    setSelectedOpening(opening);
                                                    setCurrentView('opening');
                                                    setActiveTab('theory');
                                                    if(window.innerWidth < 1024) setSidebarOpen(false);
                                                }} 
                                                className={`w-full text-left px-4 py-3 rounded-xl transition-all flex justify-between items-center group ${currentView === 'opening' && selectedOpening.id === opening.id ? 'bg-neutral-800 text-white font-bold border border-neutral-700' : 'hover:bg-neutral-800/50 text-neutral-400 border border-transparent'}`}
                                            >
                                                <span>{opening.name}</span>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </aside>

                        <main className="flex-1 p-4 lg:p-8 min-w-0">
                            <div className="max-w-6xl mx-auto">
                                
                                {currentView === 'builder' ? (
                                    <RepertoireBuilder />
                                ) : (
                                    <Fragment>
                                        <section className="mb-8">
                                            <div className="flex flex-col md:flex-row md:items-start justify-between gap-4 mb-6">
                                                <div>
                                                    <div className="flex flex-wrap items-center gap-3 mb-3">
                                                        <div className="flex items-center gap-2 text-amber-500">
                                                            <Icon name={side === 'white' ? 'sword' : 'shield'} size={20} />
                                                            <span className="text-sm font-semibold uppercase tracking-widest">{side === 'white' ? 'Répertoire Blanc' : 'Répertoire Noir'}</span>
                                                        </div>
                                                        <span className="px-3 py-1 bg-indigo-900/40 text-indigo-400 border border-indigo-700/50 rounded-full text-xs font-bold tracking-wide">
                                                            {selectedOpening.type}
                                                        </span>
                                                    </div>
                                                    <h2 className="text-2xl md:text-3xl font-extrabold text-white mb-2">{selectedOpening.name}</h2>
                                                </div>
                                                <div className="bg-neutral-800 px-5 py-3 rounded-xl border border-neutral-700 font-mono text-base text-amber-400 shadow-lg">
                                                    {selectedOpening.moves}
                                                </div>
                                            </div>
                                            <p className="text-xl text-neutral-300 border-l-4 border-amber-600 pl-6 py-2 mb-8 font-medium">
                                                {selectedOpening.description}
                                            </p>
                                        </section>

                                        <div className="flex gap-4 border-b border-neutral-800 mb-8 pb-px">
                                            <button 
                                                onClick={() => setActiveTab('theory')}
                                                className={`pb-4 px-2 font-bold transition-colors border-b-2 flex items-center gap-2 ${activeTab === 'theory' ? 'border-amber-500 text-amber-500' : 'border-transparent text-neutral-500 hover:text-neutral-300'}`}
                                            >
                                                <Icon name="book-open" size={18} /> Théorie & Analyse
                                            </button>
                                            <button 
                                                onClick={() => setActiveTab('practice')}
                                                className={`pb-4 px-2 font-bold transition-colors border-b-2 flex items-center gap-2 ${activeTab === 'practice' ? 'border-emerald-500 text-emerald-500' : 'border-transparent text-neutral-500 hover:text-neutral-300'}`}
                                            >
                                                <Icon name="dumbbell" size={18} /> Entraînement Stratégique
                                            </button>
                                        </div>

                                        {activeTab === 'theory' ? (
                                            <div className="grid gap-4 animate-fade-in">
                                                {selectedOpening.variations && selectedOpening.variations.map((variant, idx) => (
                                                    <VariationAnalysis key={`var-${selectedOpening.id}-${idx}`} variant={variant} side={side} index={idx} />
                                                ))}
                                            </div>
                                        ) : (
                                            <div className="space-y-8 animate-fade-in">
                                                {selectedOpening.exercises && selectedOpening.exercises.length > 0 ? (
                                                    selectedOpening.exercises.map(ex => <ExerciseTrainer key={ex.id} exercise={ex} />)
                                                ) : (
                                                    <div className="text-neutral-500 italic p-8 border border-neutral-800 rounded-xl bg-neutral-900/50 text-center">
                                                        <Icon name="construction" size={48} className="mx-auto mb-4 text-neutral-700" />
                                                        <p>Aucun exercice disponible pour cette ouverture pour le moment.</p>
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </Fragment>
                                )}
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => { console.log('ServiceWorker enregistré avec succès !', registration.scope); })
                    .catch(error => { console.log('Échec de l\'enregistrement du ServiceWorker :', error); });
            });
        }
    </script>
</body>
</html>
